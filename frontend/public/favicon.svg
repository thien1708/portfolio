<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="planet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4bbff"/>
      <stop offset="0.55" stop-color="#9d8df1"/>
      <stop offset="1" stop-color="#7fc3de"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a8d8ea"/>
      <stop offset="1" stop-color="#cfc5ff"/>
    </linearGradient>
  </defs>
  <!-- ring behind the planet -->
  <path d="M 1.45 43.05 A 33.8 12.35 -22 0 1 46.3 15.75" fill="none" stroke="url(#ring)" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <!-- planet -->
  <circle cx="32" cy="32" r="19" fill="url(#planet)"/>
  <!-- ring in front of the planet -->
  <path d="M 62.55 20.95 A 33.8 12.35 -22 0 1 17.7 48.25" fill="none" stroke="url(#ring)" stroke-width="4" stroke-linecap="round"/>
  <!-- soft highlight -->
  <circle cx="25.5" cy="25.5" r="7" fill="#ffffff" opacity="0.22"/>
</svg>
