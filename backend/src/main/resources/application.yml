spring:
  application:
    name: portfolio-backend
  autoconfigure:
    # Auth is handled by JwtAuthenticationFilter + AuthService, not UserDetailsService
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      # Supabase free-tier session pooler allows few client connections; keep
      # the pool small and recycle connections before the pooler's idle cutoff.
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 240000
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  # Render injects PORT; SERVER_PORT kept for other hosts; 8080 for local dev
  port: ${PORT:${SERVER_PORT:8080}}
  # Tomcat RemoteIpValve: resolve client IP/scheme from X-Forwarded-* only when
  # the direct peer is a trusted (private-range) proxy. RateLimitFilter depends
  # on this — it reads getRemoteAddr() and must not see spoofable values.
  forward-headers-strategy: native
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 1024
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

# API docs are OFF by default (production): they expose the full admin API
# surface. Set SWAGGER_ENABLED=true (or use the local profile) to enable.
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        # Health only: it includes a real DB ping, unlike the static /api/v1/health
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      # Contact-form email is optional (blank MAIL_USERNAME disables it);
      # an unconfigured SMTP account must not mark the whole app DOWN.
      enabled: false

app:
  jwt:
    # HMAC secret, at least 32 characters. REQUIRED in production.
    secret: ${JWT_SECRET:}
    access-token-minutes: 15
    refresh-token-days: 7
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  security:
    cookie-secure: ${COOKIE_SECURE:true}
  storage:
    provider: ${STORAGE_PROVIDER:supabase}
    upload-dir: uploads
    supabase:
      url: ${SUPABASE_URL:}
      service-key: ${SUPABASE_SERVICE_ROLE_KEY:}
      bucket: ${SUPABASE_STORAGE_BUCKET:portfolio}
  admin:
    email: ${ADMIN_EMAIL:tranvuthien1708@gmail.com}
    password: ${ADMIN_PASSWORD:}
  mail:
    # Blank MAIL_USERNAME disables contact-form email notifications entirely.
    from: ${MAIL_USERNAME:}
    to: ${CONTACT_NOTIFY_TO:${ADMIN_EMAIL:tranvuthien1708@gmail.com}}
