# Local development profile: file-based H2 in PostgreSQL compatibility mode,
# local disk storage for uploads, relaxed cookie security for http://localhost.
# Run with: mvnw spring-boot:run -Dspring-boot.run.profiles=local
spring:
  datasource:
    url: jdbc:h2:file:./data/portfolio;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

app:
  jwt:
    secret: local-dev-only-secret-0123456789abcdef0123456789abcdef
  security:
    cookie-secure: false
  storage:
    provider: local
  admin:
    email: tranvuthien1708@gmail.com
    password: Admin@123
