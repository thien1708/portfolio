# Render Blueprint — deploys the Spring Boot backend as a Docker web service.
# Dashboard → New → Blueprint → select this repository.
# Values marked `sync: false` are prompted for / set in the Render dashboard.
services:
  - type: web
    name: portfolio-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      # --- Supabase PostgreSQL (Session pooler, port 5432) ---
      - key: DATABASE_URL
        sync: false # jdbc:postgresql://aws-0-<region>.pooler.supabase.com:5432/postgres
      - key: DATABASE_USERNAME
        sync: false # postgres.<project-ref>
      - key: DATABASE_PASSWORD
        sync: false
      # --- Security ---
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: tranvuthien1708@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      # Your Netlify site origin(s), comma-separated — REQUIRED for the
      # contact form and admin panel to work through the Netlify proxy.
      - key: CORS_ALLOWED_ORIGINS
        sync: false # e.g. https://your-site.netlify.app
      # --- Contact-form email notifications (Gmail SMTP, optional) ---
      # MAIL_PASSWORD is a Gmail App Password (Google Account -> Security
      # -> 2-Step Verification -> App passwords). Leave MAIL_USERNAME
      # empty to disable notifications.
      - key: MAIL_USERNAME
        sync: false # your-gmail@gmail.com
      - key: MAIL_PASSWORD
        sync: false # 16-char app password
      # --- Supabase Storage (image uploads from the admin panel) ---
      - key: STORAGE_PROVIDER
        value: supabase
      - key: SUPABASE_URL
        sync: false # https://<project-ref>.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: portfolio
