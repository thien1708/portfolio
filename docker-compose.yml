# Full-stack local deployment (requires Docker).
#   1. Copy .env.example to .env and fill in values.
#      For a fully local run (no Supabase), keep the defaults below:
#      docker compose up --build
#   2. Open http://localhost:8081 (public) / http://localhost:8081/admin
#
# The bundled postgres service replaces Supabase for local development;
# point DATABASE_URL at Supabase in .env to use the real thing.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/portfolio}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-string-of-32-plus-chars}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-tranvuthien1708@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-portfolio}
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  pgdata:
  uploads:
