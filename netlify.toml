# Netlify config — builds the Angular app and proxies /api to the Render
# backend so the site and API share one origin (no CORS issues in the browser,
# the auth cookie stays SameSite=Strict).
#
# ⚠️ Replace RENDER_BACKEND_URL below with your real Render URL
#    (shown on the service page, e.g. https://portfolio-backend-abcd.onrender.com)

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist/frontend/browser"

[build.environment]
  NODE_VERSION = "22"

# --- API proxy → Render backend ---
[[redirects]]
  from = "/api/*"
  to = "https://RENDER_BACKEND_URL.onrender.com/api/:splat"
  status = 200
  force = true

# Only used when the backend runs with STORAGE_PROVIDER=local
[[redirects]]
  from = "/uploads/*"
  to = "https://RENDER_BACKEND_URL.onrender.com/uploads/:splat"
  status = 200
  force = true

# --- SPA fallback (must stay last) ---
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
